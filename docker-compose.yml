version: '3.8'

services:
  baji-crypto-lab:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: baji-crypto-lab:latest
    container_name: baji-crypto-lab-web
    restart: unless-stopped
    ports:
      - "4321:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
